name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, sproink version, etc.
      placeholder: |
        - OS: Ubuntu 24.04
        - Rust: 1.85.0
        - sproink: 0.1.0
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Backtrace
      description: Any relevant log output or backtraces.
      render: shell
    validations:
      required: false
